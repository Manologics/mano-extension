<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mano - AI Operator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="sidebar-body">
  <div class="sidebar-container">
    <header class="sidebar-header">
      <h1 class="title">Mano</h1>
      <span class="version">v13.0.0</span>
      <button id="settingsBtn">Settings</button>
    </header>
    <div class="chat-container" id="chatContainer">
      <div id="messages" class="messages-list"></div>
    </div>
    <div class="input-area">
      <textarea id="userInput" placeholder="Ask Mano anything..." rows="3"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
  <div class="settings-panel hidden" id="settingsPanel">
    <h2>Settings</h2>
    <label>API Key: <input type="password" id="apiKeyInput" placeholder="Enter your API key"></label>
    <button id="saveSettingsBtn">Save</button>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
